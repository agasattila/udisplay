# .github/workflows/udisplay-client-build.yml

name: Build uDisplay client

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "udisplay-client/**"
      - ".github/workflows/udisplay-client-build.yml"

  pull_request:
    paths:
      - "udisplay-client/**"
      - ".github/workflows/udisplay-client-build.yml"

permissions:
  contents: read

jobs:
  build-linux:
    name: Linux build
    runs-on: ubuntu-24.04

    steps:
      # 1. Checkout source
      - name: Checkout source
        uses: actions/checkout@v4

      # 2. Install Qt
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.11.0"
          modules: "qtconnectivity qttasktree"
          cache: true

      # 3. Install build dependencies
      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt install -y \
              build-essential \
              cmake \
              git \
              pkg-config \
              qt6-base-dev \
              qt6-declarative-dev \
              libqt6quickcontrols2-6 \
              qml6-module-qtquick-controls \
              zlib1g-dev \
              libavahi-client-dev \
              librsvg2-bin

      # 4. CMake configuration
      - name: Configure
        run: |
          cmake \
            -S udisplay-client \
            -B build/udisplay-client \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/package" \
            -DUDISPLAY_CLIENT_BUILD_TESTS=ON

      # 5. Build
      - name: Build
        run: |
          cmake \
            --build build/udisplay-client \
            --parallel

      # 5.b Test      
      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          ctest \
            --test-dir build/udisplay-client \
            --output-on-failure

      # 6. Install
      - name: Install into staging directory
        run: |
          cmake \
            --install build/udisplay-client

      # 7. Create archive
      - name: Create archive
        run: |
          tar \
            -C package \
            -czf udisplay-client-linux-x86_64.tar.gz \
            .

      # Download linuxdeploy  tools
      - name: Download linuxdeploy tools
        run: |
          mkdir -p tools

          wget \
            --quiet \
            --output-document=tools/linuxdeploy-x86_64.AppImage \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage

          wget \
            --quiet \
            --output-document=tools/linuxdeploy-plugin-qt-x86_64.AppImage \
            https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage

          chmod +x tools/*.AppImage

      # Build AppImage
      - name: Build AppImage
        env:
          QML_SOURCES_PATHS: ${{ github.workspace }}/udisplay-client/qml
          QMAKE: ${{ env.QT_ROOT_DIR }}/bin/qmake
          APPIMAGE_EXTRACT_AND_RUN: "1"
          OUTPUT: uDisplay-${{ github.sha }}-x86_64.AppImage
        run: |
          echo "Contents of package directory:"
          find "${{ github.workspace }}/package" \( -type f -o -type l \) -print | sort
          tools/linuxdeploy-x86_64.AppImage \
            --appdir "${{ github.workspace }}/package/bin" \
            --plugin qt \
            --output appimage

          test -f "${OUTPUT}"
          chmod +x "${OUTPUT}"           
            
      # Upload workflow artifact
      - name: Upload tar.gz artifact
        uses: actions/upload-artifact@v4
        with:
          name: udisplay-client-linux-x86_64
          path: udisplay-client-linux-x86_64.tar.gz
          if-no-files-found: error
          retention-days: 30
      
      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: udisplay-client-linux-appimage-${{ github.sha }}
          path: uDisplay-${{ github.sha }}-x86_64.AppImage
          if-no-files-found: error
          retention-days: 30         

  release:
    name: Create GitHub Release
    needs: build-linux

    # Runs only on tag push
    if: startsWith(github.ref, 'refs/tags/v')

    runs-on: ubuntu-24.04

    permissions:
      contents: write

    steps:
      # Use previous artifact
      - name: Download workflow artifact
        uses: actions/download-artifact@v4
        with:
          name: udisplay-client-linux-x86_64
          path: release-files

      # Create release
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            release-files/udisplay-client-linux-x86_64.tar.gz \
            --title "uDisplay ${{ github.ref_name }}" \
            --generate-notes
