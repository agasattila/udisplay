device:
  name: "Demo01"
  version: "1.0"
  description: "Hardware-less demo device — exercises all v1 widget types over TCP"

widgets:
  header:
    type: row
    widgets:
      lbl_title_left:
        type: label
        text: "==="
        align: left
      lbl_title:
        type: label
        style: heading
        text: "Welcome to demo01"
        align: center
      lbl_title_right:
        type: label
        text: "==="
        align: right

  sep1:
    type: separator

  row_temp:
    type: row
    flex: 1
    widgets:
      enable_toggle:
        type: toggle
        label: "Enabled"
        align: left
      temp_display:
        type: display
        label: "Temperature"
        format: "%.1f"
        unit: "°C"
        style: large
        align: right

  sep2:
    type: separator

  row1:
    type: row
    widgets:
      pwr_label:
        type: label
        text: "A simple On/Off button without function:"
        align: left
      power_btn:
        type: button
        label: "Power"
        shape: rect
        align: right
        widgets:
          power_led:
            type: led
            color: "#FF0000"
            label: "PWR"

  sep3:
    type: separator

  grid_btn_grp:
    type: grid
    columns: 1
    widgets:
      mode_sel:
        type: button-group
        label: "Refresh"
        align: center
        layout: grid
        items:
          fast:
            label: "Fast"
          slow:
            label: "Slow"
          turbo:
            label: "Turbo"
      status_led:
        type: led
        label: "Active"
        align: center
        
  sep4:
    type: separator

  rate_slider:
    type: slider
    label: "Sample Rate"
    min: 0.1
    max: 10.0
    step: 0.1
    unit: "Hz"

  sep5:
    type: separator

  text_input:
    type: text
    label: "You can type here something:"
    mode: rw
    placeholder: "Enter some text"
    maxlength: 64
